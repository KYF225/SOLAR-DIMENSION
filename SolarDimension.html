      { label: 'Pylontech US5000 LiFePO4 48V 100Ah (5kWh)',    voltage: 48, capacity: 100, discharge: 0.80 },
      { label: 'Victron LiFePO4 51.2V 200Ah (10.2kWh)',        voltage: 48, capacity: 200, discharge: 0.80 },
      { label: 'Generic LiFePO4 48V 50Ah',                     voltage: 48, capacity:  50, discharge: 0.80 },
      { label: 'Generic LiFePO4 48V 100Ah',                    voltage: 48, capacity: 100, discharge: 0.80 },
      { label: 'Generic LiFePO4 48V 150Ah',                    voltage: 48, capacity: 150, discharge: 0.80 },
      { label: 'Generic LiFePO4 48V 200Ah',                    voltage: 48, capacity: 200, discharge: 0.80 },

      // ─── LiFePO4 Haute Tension ────────────────────────────────────────────────────
      { label: 'BYD HVS 5.1kWh LiFePO4 102V 50Ah',            voltage: 102, capacity:  50, discharge: 0.80 },
      { label: 'BYD HVS 10.2kWh LiFePO4 102V 100Ah',          voltage: 102, capacity: 100, discharge: 0.80 },
      { label: 'BYD HVM 8.28kWh LiFePO4 204V 40.5Ah',         voltage: 204, capacity:  41, discharge: 0.80 },
      { label: 'Pylontech Force H1 LiFePO4 48V 200Ah (10kWh)', voltage:  48, capacity: 200, discharge: 0.80 },
      { label: 'Pylontech Force H2 LiFePO4 48V 400Ah (19.2kWh)', voltage: 48, capacity: 400, discharge: 0.80 },
    ];

    // =========================================================
    // CALCULATIONS
    // =========================================================
    // Fenêtre de production PV (heures solaires)
    const PV_START = 6, PV_END = 18;

    // Renvoie true si ce load est actif à l'heure h
    // Priorité : activeHours[] (matrice 24h) > startHour+hours (legacy)
    function activeAtHour(load, h) {
      if (load.activeHours) return !!load.activeHours[h];
      // Fallback legacy (projets sauvegardés sans activeHours)
      const start = Math.floor(load.startHour ?? 18) % 24;
      const dur   = Math.min(Math.ceil(load.hours || 0), 24);
      if (dur >= 24) return true;
      const end = (start + dur) % 24;
      return start < end ? (h >= start && h < end) : (h >= start || h < end);
    }

    function calculateSolarSystem(loads, settings) {
      let rawEnergyAC = 0, rawEnergyAC_day = 0, rawEnergyAC_night = 0;
      let rawEnergyDC = 0, rawEnergyDC_day = 0, rawEnergyDC_night = 0;
      let maxPowerApparent = 0;

      const ks = settings.ks ?? 1.0;
      const ke = settings.ke ?? 1.0;

      loads.forEach(load => {
        const ku = load.ku ?? 1.0;

        // Compter les heures actives via la matrice 24h (ou fallback legacy)
        let activeHrsCount = 0, dayH = 0;
        for (let h = 0; h < 24; h++) {
          if (activeAtHour(load, h)) {
            activeHrsCount++;
            if (h >= PV_START && h < PV_END) dayH++;
          }
        }

        const energy     = load.power * ku * activeHrsCount * load.quantity;
        const totalPower = load.power * ku * load.quantity;
        const dayFrac    = activeHrsCount > 0 ? dayH / activeHrsCount : 0;

        if (load.type === LoadType.AC) {
          rawEnergyAC       += energy;
          rawEnergyAC_day   += energy * dayFrac;
          rawEnergyAC_night += energy * (1 - dayFrac);
          maxPowerApparent  += totalPower;
        } else {
          rawEnergyDC       += energy;
          rawEnergyDC_day   += energy * dayFrac;
          rawEnergyDC_night += energy * (1 - dayFrac);
        }
      });

      // Profil horaire 24h (puissance totale par heure)
      const hourlyProfile = Array.from({ length: 24 }, (_, h) => {
        const power = loads.reduce((sum, load) => {
          if (!activeAtHour(load, h)) return sum;
          return sum + load.power * (load.ku ?? 1.0) * load.quantity;
        }, 0);
        return { h, label: h < 10 ? `0${h}h` : `${h}h`, power: Math.round(power * ks * ke) };
      });
      const peakHour = hourlyProfile.reduce((max, p) => p.power > max.power ? p : max, { power: 0 });

      // Facteurs globaux : Ks (simultanéité) × Ke (extension/réserve)
      rawEnergyAC       *= ks * ke;
      rawEnergyAC_day   *= ks * ke;
      rawEnergyAC_night *= ks * ke;
      rawEnergyDC       *= ks * ke;
      rawEnergyDC_day   *= ks * ke;
      rawEnergyDC_night *= ks * ke;
      maxPowerApparent  *= ks * ke;

      const correctedEnergyAC = rawEnergyAC / settings.inverterEfficiency;
      const totalEnergyDaily = correctedEnergyAC + rawEnergyDC;
      const peakPower = totalEnergyDaily / (settings.kFactor * settings.irradiation);

      let systemVoltage = 12;
      if (peakPower >= 500 && peakPower <= 2000) systemVoltage = 24;
      else if (peakPower > 2000) systemVoltage = 48;

      const totalPanelsRaw = peakPower / settings.panelPower;
      const totalPanels = Math.ceil(totalPanelsRaw);

      let panelsSeries = Math.ceil(systemVoltage / (settings.panelVoltage * 0.8));
      if (panelsSeries < 1) panelsSeries = 1;

      const panelsParallel = Math.ceil(totalPanels / panelsSeries);
      const finalTotalPanels = panelsSeries * panelsParallel;

      const batteryBankCapacity = (totalEnergyDaily * settings.autonomyDays) / (settings.dischargeLimit * systemVoltage);
      const batteryBankCapacityKWh = (batteryBankCapacity * systemVoltage) / 1000;

      const batteriesSeries = systemVoltage / settings.batteryVoltage;
      const batteriesParallel = Math.ceil(batteryBankCapacity / settings.batteryCapacity);
      const totalBatteries = batteriesSeries * batteriesParallel;

      const regulatorAmps = (finalTotalPanels * settings.panelPower) / systemVoltage;
      const inverterPower = maxPowerApparent * 1.5;

      return {
        totalEnergyDaily,
        energyAC: correctedEnergyAC,
        energyAC_raw: rawEnergyAC,
        energyDC: rawEnergyDC,
        peakPower,
        systemVoltage,
        totalPanels: finalTotalPanels,
        panelsSeries,
        panelsParallel,
        batteryBankCapacity,
        batteryBankCapacityKWh,
        totalBatteries,
        batteriesSeries,
        batteriesParallel,
        regulatorAmps,
        inverterPower,
        ksKe: ks * ke,
        energyDay:   rawEnergyAC_day / settings.inverterEfficiency + rawEnergyDC_day,
        energyNight: rawEnergyAC_night / settings.inverterEfficiency + rawEnergyDC_night,
        hourlyProfile,
        peakHour,
      };
    }

    function calculateCableSection(length, current, voltage, dropPercent = 0.02, isAC3ph = false) {
      // ρ Cu à 70°C = 0.0225 Ω·mm²/m (NFC 15-100 / guide ELEKTRA)
      const rho = 0.0225;
      const deltaU = dropPercent * voltage;
      if (deltaU === 0) return 0;
      // DC : ΔV = 2 × L × I × ρ / S  → S = 2LIρ/ΔU
      // AC 3ph : ΔV = √3 × L × I × ρ / S → S = √3LIρ/ΔU
      const factor = isAC3ph ? Math.sqrt(3) : 2;
      return (factor * length * rho * current) / deltaU;
    }

    // Table câbles solaires H1Z2Z2-K (ampacité en pose libre, 70°C)
    const DC_SOLAR_CABLE_TABLE = [
      { section: 4,  ampacity: 38  },
      { section: 6,  ampacity: 49  },
      { section: 10, ampacity: 66  },
      { section: 16, ampacity: 88  },
      { section: 25, ampacity: 117 },
      { section: 35, ampacity: 142 },
      { section: 50, ampacity: 170 },
    ];
    // U-1000 R2V Cu — pose en conduit (NFC 15-100, méthode B2, facteur 1.25 inclus)
    const AC_CABLE_TABLE = [
      { section: 1.5, ampacity: 14.5 },
      { section: 2.5, ampacity: 19.5 },
      { section: 4,   ampacity: 26   },
      { section: 6,   ampacity: 34   },
      { section: 10,  ampacity: 46   },
      { section: 16,  ampacity: 61   },
      { section: 25,  ampacity: 80   },

    function calculateStringConfig(s) {
      const beta  = s.beta  / 100;
      const alpha = s.alpha / 100;

      // Tensions corrigées en température
      const vocTmin  = s.voc  * (1 + beta  * (s.tMinCell - 25));
      const vocTmax  = s.voc  * (1 + beta  * (s.tMaxCell - 25));
      const vmppTmin = s.vmpp * (1 + beta  * (s.tMinCell - 25));
      const vmppTmax = s.vmpp * (1 + beta  * (s.tMaxCell - 25));
      const iscTmax  = s.isc  * (1 + alpha * (s.tMaxCell - 25));
      const imppTmax = s.impp * (1 + alpha * (s.tMaxCell - 25));

      // Plage admissible de panneaux/string
      const nMax = Math.floor(s.vdcMax   / vocTmin);
      const nMin = Math.ceil (s.vmpptMin / vmppTmax);

      const N  = s.nPanelsSeries;
      const Np = s.nStringsParallel;

      // Tensions string pour N choisi
      const vStringVocTmin  = N * vocTmin;
      const vStringVocSTC   = N * s.voc;
      const vStringVmppSTC  = N * s.vmpp;
      const vStringVmppTmax = N * vmppTmax;

      // Courants par MPPT (Np strings en parallèle)
      const iMpptImpp     = Np * s.impp;
      const iMpptIsc      = Np * s.isc;
      const iMpptImppTmax = Np * imppTmax;
      const iMpptIscTmax  = Np * iscTmax;

      const totalInputs = s.nMPPT * s.inputsPerMPPT;

      const checks = [
        { label: 'Voc(Tmin)×N < Vdc_max onduleur',
          formula: `${vStringVocTmin.toFixed(1)} V < ${s.vdcMax} V`,
          ok: vStringVocTmin < s.vdcMax },
        { label: 'Vmpp(STC) dans plage MPPT',
          formula: `${s.vmpptMin} ≤ ${vStringVmppSTC.toFixed(1)} ≤ ${s.vmpptMax} V`,
          ok: vStringVmppSTC >= s.vmpptMin && vStringVmppSTC <= s.vmpptMax },
        { label: 'Vmpp(Tmax) > V_startup onduleur',
          formula: `${vStringVmppTmax.toFixed(1)} V > ${s.vstartup} V`,
          ok: vStringVmppTmax > s.vstartup },
        { label: 'N dans la plage [Nmin ; Nmax]',
          formula: `${nMin} ≤ ${N} ≤ ${nMax}`,
          ok: N >= nMin && N <= nMax },
        { label: 'Isc par MPPT < Isc_max MPPT',
          formula: `${iMpptIsc.toFixed(2)} A < ${s.iscMaxMPPT} A`,
          ok: iMpptIsc < s.iscMaxMPPT },
        { label: 'Impp par MPPT < Imp_max MPPT',
          formula: `${iMpptImpp.toFixed(2)} A < ${s.imppMaxMPPT} A`,
          ok: iMpptImpp < s.imppMaxMPPT },
        { label: 'Voc(Tmin)×N < Vsys_max panneau',
          formula: `${vStringVocTmin.toFixed(1)} V < ${s.vsysMax} V`,
          ok: vStringVocTmin < s.vsysMax },
        { label: 'Strings/MPPT ≤ entrées disponibles/MPPT',
          formula: `${Np} ≤ ${s.inputsPerMPPT} entrées/MPPT`,
          ok: Np <= s.inputsPerMPPT },
      ];

      // ── DC Box (Étape 9) ──────────────────────────────────────
      const stdFuses   = [10, 13, 16, 20, 25, 32, 40, 50, 63];
      const stdDCVolt  = [600, 800, 1000, 1200, 1500];
      const stdDCAmp   = [16, 20, 25, 32, 40, 50, 63, 80, 100, 125];

      const dcFuseRaw  = 1.5 * s.isc;
      const dcFuseStd  = stdFuses.find(v => v >= dcFuseRaw) || 63;
      const dcFuseOk   = dcFuseStd <= s.fuseMax;

      const dcSurgeUcpv   = vStringVocTmin * 1.2;
      const dcSurgeStd    = stdDCVolt.find(v => v >= dcSurgeUcpv) || 1500;

      const dcDiscoI      = Np * s.isc * 1.25;
      const dcDiscoIStd   = stdDCAmp.find(v => v >= dcDiscoI) || 125;
      const dcDiscoVStd   = stdDCVolt.find(v => v > vStringVocTmin) || 1500;

      // Câble string→DC Box : Isc × 1.25 → section H1Z2Z2-K
      const dcCableStringI = s.isc * 1.25;
      const dcCableSizes   = [4, 6, 10, 16, 25, 35, 50];
      const dcCableStringStd = dcCableSizes.find(sz => {
        // ampacité approximative (H1Z2Z2-K pose libre) : 4→38A, 6→49A, 10→66A, 16→88A, 25→117A, 35→142A
        const ampacity = {4:38, 6:49, 10:66, 16:88, 25:117, 35:142, 50:170};
        return ampacity[sz] >= dcCableStringI;
      }) || 50;

      // Câble DC Box→onduleur : Isc_total × 1.25
      const dcCableMainI   = Np * s.isc * 1.25;
      const dcCableMainStd = dcCableSizes.find(sz => {
        const ampacity = {4:38, 6:49, 10:66, 16:88, 25:117, 35:142, 50:170};
        return ampacity[sz] >= dcCableMainI;
      }) || 50;

      // ── AC Box (Étape 10) ─────────────────────────────────────
      const iAC = s.phaseType === 'tri'
        ? (s.pacNominal * 1000) / (1.732 * 400)
        : (s.pacNominal * 1000) / (230 * s.cosPhiAC);

      const stdACBreaker = [16,20,25,32,40,50,63,80,100,125,160,200,250,315,400];
      const acBreakerRaw = iAC * 1.25;
      const acBreakerStd = stdACBreaker.find(v => v >= acBreakerRaw) || 400;

      const acSurgeVoltage = s.phaseType === 'tri' ? 400 : 230;
      const acRCDType      = 'Type B (composante DC)';
      const acRCDmA        = 300;

      // Câble AC : Iac × 1.25 → section cuivre
      const acCableSizes = [
        {s:6,iz:46},{s:10,iz:63},{s:16,iz:85},{s:25,iz:112},
        {s:35,iz:138},{s:50,iz:168},{s:70,iz:213},{s:95,iz:258}
      ];
      const acCableStd = (acCableSizes.find(e => e.iz >= acBreakerRaw) || {s:95}).s;

      return {
        vocTmin, vocTmax, vmppTmin, vmppTmax, iscTmax, imppTmax,
        nMax, nMin,
        vStringVocTmin, vStringVocSTC, vStringVmppSTC, vStringVmppTmax,
        iMpptImpp, iMpptIsc, iMpptImppTmax, iMpptIscTmax,
        totalInputs, checks, allOk: checks.every(c => c.ok),
        // DC Box
        dcFuseRaw, dcFuseStd, dcFuseOk,
        dcSurgeUcpv, dcSurgeStd,
        dcDiscoI, dcDiscoIStd, dcDiscoVStd,
        dcCableStringI, dcCableStringStd,
        dcCableMainI, dcCableMainStd,
        // AC Box
        iAC, acBreakerRaw, acBreakerStd,
        acSurgeVoltage, acRCDType, acRCDmA,
        acCableStd,
      };
    }

    function StepProgress({ activeTab, setActiveTab }) {
      const handleStepClick = (step) => {
        if (step.status === 'todo' || !step.anchor) return;
        if (step.tab !== activeTab) {
          setActiveTab(step.tab);
          setTimeout(() => {
            const el = document.getElementById(step.anchor);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });

        partial: { ring: 'bg-orange-400 border-orange-400 text-white',       line: 'bg-orange-200', lbl: 'text-orange-600' },
        todo:    { ring: 'bg-white border-gray-300 text-gray-400',           line: 'bg-gray-200',   lbl: 'text-gray-400'   },

                <span className="flex items-center gap-1"><span className="inline-block w-2 h-2 rounded-full bg-gray-300 border border-gray-300" />À venir</span>
              </div>
            </div>
            <div className="overflow-x-auto pb-1">
              <div className="flex items-start min-w-max">
                {STEPS_DEF.map((step, idx) => {
                  const s = styleMap[step.status];

                  return (
                    <React.Fragment key={step.n}>

          const maxScroll = el.scrollWidth - el.clientWidth;
          setIsScrollable(maxScroll > 4);
          setScrollPct(maxScroll > 0 ? el.scrollLeft / maxScroll : 0);

        update();
        el.addEventListener('scroll', update);
        window.addEventListener('resize', update);
        return () => { el.removeEventListener('scroll', update); window.removeEventListener('resize', update); };

                        <td className="px-2 py-2">
                          <input type="number" min="0" value={load.power}
                            onChange={(e) => updateLoad(load.id, 'power', parseFloat(e.target.value) || 0)}
                            className="w-full bg-blue-50/70 border border-blue-100 rounded px-2 py-1 text-right text-sm font-semibold text-blue-900 focus:ring-1 focus:ring-blue-400"
                          />
                        </td>

                        {/* Qté */}
                        <td className="px-2 py-2">
                          <input type="number" min="1" value={load.quantity}
                            onChange={(e) => updateLoad(load.id, 'quantity', parseInt(e.target.value) || 1)}
                            className="w-full bg-blue-50/70 border border-blue-100 rounded px-2 py-1 text-right text-sm text-blue-900 focus:ring-1 focus:ring-blue-400"
                          />
                        </td>

                        {/* Ku */}
                        <td className="px-2 py-2 border-l border-amber-50">
                          <input type="number" step="0.05" min="0.1" max="1" value={load.ku ?? 1.0}
                            onChange={(e) => updateLoad(load.id, 'ku', Math.min(1, Math.max(0.1, parseFloat(e.target.value) || 1.0)))}
                            className="w-full bg-amber-50 border border-amber-200 rounded px-2 py-1 text-right text-sm font-semibold text-amber-800 focus:ring-1 focus:ring-amber-400"
                            title="Facteur d'utilisation"
                          />
                        </td>

                        {/* Wh/j */}
                        <td className="px-2 py-2 border-l border-emerald-50 text-right">
                          <span className={`text-xs font-bold px-1.5 py-0.5 rounded ${wh > 0 ? 'bg-emerald-50 text-emerald-700' : 'text-gray-300'}`}>
                            {wh > 0 ? wh.toLocaleString() : '—'}
                          </span>
                        </td>

                        {/* Supprimer */}
                        <td className="px-2 py-2 text-center print:hidden">
                          <button onClick={() => removeLoad(load.id)}
                            className="text-red-300 hover:text-red-500 hover:bg-red-50 rounded p-1 transition-colors">
                            <Trash2 className="w-3.5 h-3.5" />
                          </button>
                        </td>
                      </tr>

                      {/* ── Ligne B : matrice 24h ── */}
                      <tr className="border-b border-gray-100" style={{ background: rowBg }}>
                        <td colSpan={7} className="px-3 pb-2.5 pt-1">
                          <div className="flex items-center gap-2">

                            {/* Label */}
                            <span className="text-[10px] text-gray-400 font-medium flex-shrink-0 w-12">⏱ Plage</span>

                            {/* Grille 24 cellules */}
                            <div className="flex gap-px flex-1 min-w-0">
                              {Array.from({ length: 24 }, (_, h) => {
                                const active = !!(load.activeHours?.[h]);
                                const isPV   = h >= PV_START && h < PV_END;
                                return (
                                  <div key={h} className="flex flex-col items-center flex-1" style={{ minWidth: '13px' }}>
                                    {/* Étiquette heure toutes les 6h */}
                                    {h % 6 === 0
                                      ? <span className="text-[7px] text-gray-400 leading-none mb-0.5 select-none">{h}h</span>
                                      : <span className="text-[7px] leading-none mb-0.5 select-none opacity-0">·</span>
                                    }
                                    <button type="button"
                                      onClick={() => toggleHour(load.id, h, load.activeHours)}
                                      style={{ height: '18px', width: '100%' }}
                                      className={`rounded-[2px] border transition-colors duration-75 ${
                                        active
                                          ? isPV
                                            ? 'bg-orange-400 border-orange-500 shadow-sm'
                                            : 'bg-indigo-500 border-indigo-600 shadow-sm'
                                          : isPV
                                            ? 'bg-amber-50 border-amber-200 hover:bg-amber-200'
                                            : 'bg-gray-100 border-gray-200 hover:bg-gray-300'
                                      }`}
                                      title={`${h < 10 ? '0'+h : h}h — ${active ? '✓ actif' : 'inactif'} — ${isPV ? '☀️ fenêtre PV' : '🌙 nuit'}`}
                                    />
                                  </div>
                                );
                              })}
                            </div>

                            {/* Compteur h/j */}
                            <span className={`flex-shrink-0 text-[11px] font-bold px-2 py-0.5 rounded-full ${actH > 0 ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-400'}`}>
                              {actH}h/j
                            </span>
                          </div>

                          {/* Présets rapides */}
                          <div className="flex items-center gap-1 mt-1.5 ml-14 flex-wrap print:hidden">
                            {presets.map(p => (
                              <button key={p.label} type="button"
                                onClick={() => updateLoad(load.id, 'activeHours', p.fn())}
                                className="text-[9px] px-1.5 py-0.5 rounded border bg-white hover:bg-gray-50 text-gray-600 border-gray-200 transition-colors leading-none">
                                {p.label}
                              </button>
                            ))}
                          </div>
                        </td>
                      </tr>

                    </React.Fragment>
                  );
                })}

                {/* Ligne totaux */}
                {loads.length > 0 && (
                  <tr className="bg-gray-800 text-white text-xs font-semibold">
                    <td className="sticky-col bg-gray-800 px-3 py-2.5 text-left border-r border-gray-600">
                      TOTAL — {loads.length} type{loads.length > 1 ? 's' : ''}
                    </td>
                    <td colSpan={2} className="px-3 py-2.5 text-center text-gray-400">—</td>
                    <td className="px-3 py-2.5 text-right text-blue-300">{totalQty}</td>
                    <td className="px-3 py-2.5 border-l border-gray-600 text-center text-gray-400">—</td>
                    <td className="px-3 py-2.5 border-l border-gray-600 text-right text-emerald-300">
                      {totalWh.toLocaleString()} Wh/j
                    </td>
                    <td className="px-3 py-2.5 print:hidden"></td>
                  </tr>
                )}

                {loads.length === 0 && (
                  <tr>
                    <td colSpan={7} className="px-4 py-8 text-center text-gray-400 italic text-sm">
                      Aucun appareil. Cliquez sur <strong>+ Ajouter</strong> pour commencer.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>

          {/* Légende rapide */}
          {loads.length > 0 && (
            <div className="px-5 py-3 border-t border-gray-100 flex flex-wrap gap-x-4 gap-y-1 text-[10px] text-gray-400 print:hidden">
              <span className="flex items-center gap-1"><span className="inline-block w-3 h-2 rounded-sm bg-blue-200"/> Charge électrique</span>
              <span className="flex items-center gap-1"><span className="inline-block w-3 h-2 rounded-sm bg-amber-200"/> Ku = facteur utilisation</span>
              <span className="flex items-center gap-1"><span className="inline-block w-3 h-2 rounded-sm bg-yellow-200"/> Plage jour (6h–18h)</span>
              <span className="flex items-center gap-1"><span className="inline-block w-3 h-2 rounded-sm bg-slate-200"/> Plage nuit</span>
              <span className="ml-auto font-medium text-gray-500">Σ(P×Ku×h×N) = <strong>{totalWh.toLocaleString()} Wh/j</strong></span>
            </div>
          )}
        </div>
      );
    }

    // =========================================================
    // COMPONENT: SettingsInput
    // =========================================================
    function SettingsInput({ settings, setSettings }) {
      const handleChange = (field, value) => {
        setSettings(prev => ({
          ...prev,
          [field]: parseFloat(value) || 0
        }));
      };

      const handleBatteryPreset = (e) => {
        const idx = parseInt(e.target.value);
        if (idx >= 0 && idx < BATTERY_PRESETS.length) {
          const preset = BATTERY_PRESETS[idx];
          setSettings(prev => ({
            ...prev,
            batteryVoltage: preset.voltage,
            batteryCapacity: preset.capacity,
            dischargeLimit: preset.discharge
          }));
        }
      };

      const singleBatteryKWh = (settings.batteryVoltage * settings.batteryCapacity) / 1000;

      return (
        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 print:shadow-none print:border-gray-300 print:break-inside-avoid">

                    value={settings.irradiation}
                    onChange={(e) => handleChange('irradiation', e.target.value)}

                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    Autonomie (N)
                    <span className="block text-xs text-gray-400 font-normal">Jours</span>
                  </label>
                  <input
                    type="number"
                    value={settings.autonomyDays}
                    onChange={(e) => handleChange('autonomyDays', e.target.value)}

                  />

                <div>

                    min="0.3"
                    max="1"

                  />

            {/* Spécifications Batterie */}

                </span>

              <div className="mb-3">

                  className="w-full bg-gray-50 border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 text-black print:hidden"

                  defaultValue=""

                    value={settings.batteryVoltage}

                <div>

                    <span className="block text-xs text-gray-400 font-normal">Ah (ex: 200)</span>

                    type="number"

                  />

                <div className="col-span-2">
                  <label className="block text-sm font-medium text-gray-700 mb-1">
                    Décharge Max (D)
                    <span className="block text-xs text-gray-400 font-normal">0.5-0.8 pour Plomb, 0.9 Lithium</span>
                  </label>

                    type="number"
                    step="0.05"
                    max="1"
                    value={settings.dischargeLimit}
                    onChange={(e) => handleChange('dischargeLimit', e.target.value)}
                    className="w-full bg-gray-50 border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 text-black print:border-none print:bg-transparent print:p-0 print:font-semibold"
                  />

                  <label className="block text-sm font-medium text-gray-700 mb-1">

    // =========================================================
    // COMPONENT: ResultsDisplay
    // =========================================================
    function ResultsDisplay({ results, settings, openCableTool }) {
      const inverterLosses = results.energyAC - results.energyAC_raw;

      const energyData = [
        { name: 'DC (Direct)',     value: results.energyDC,      color: '#3B82F6' },
        { name: 'AC (Appareils)',  value: results.energyAC_raw,  color: '#10B981' },
        { name: 'Pertes Onduleur', value: inverterLosses,        color: '#F59E0B' },
      ].filter(item => item.value > 0);

      const handleDownloadPDF = () => {
        const element = document.getElementById('report-container');
        if (!element) return;
        if (typeof window !== 'undefined' && window.html2pdf) {
          const opt = {
            margin: [10, 10],
            filename: `rapport-solaire-${new Date().toISOString().split('T')[0]}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
          };
          window.html2pdf().set(opt).from(element).save();
        } else {
          alert("La librairie PDF n'est pas chargée. Essayez le bouton Imprimer.");
        }
      };

      return (
        <div className="space-y-6 print:break-inside-avoid">
          <div className="bg-white p-6 rounded-xl shadow-lg border border-blue-100 print:shadow-none print:border-gray-300">
            <div className="flex justify-between items-center mb-4 border-b pb-2">
              <h2 className="text-xl font-bold text-gray-900">Rapport de Dimensionnement</h2>

                <button
                  onClick={handleDownloadPDF}
                  className="p-2 text-green-600 hover:bg-green-50 rounded-full transition-colors"

                >
                  <Download className="w-5 h-5" />
                </button>

                  onClick={() => window.print()}
                  className="p-2 text-blue-600 hover:bg-blue-50 rounded-full transition-colors"

                  <Printer className="w-5 h-5" />
                </button>

              <div className="bg-orange-50 p-4 rounded-lg print:bg-transparent print:border print:border-orange-200">
                <span className="text-xs text-orange-600 font-bold uppercase">Consommation Journalière (Ej)</span>
                <div className="text-2xl font-bold text-gray-900 mt-1">

                <div className="text-2xl font-bold text-gray-900 mt-1">
                  {Math.round(results.peakPower).toLocaleString()} <span className="text-sm font-normal text-gray-500">Wc</span>
                </div>
              </div>
            </div>

            {/* Facteurs appliqués */}
            {settings && results.ksKe !== undefined && (
              <div className="mb-4 text-xs bg-amber-50 border border-amber-200 rounded-lg px-4 py-2.5 grid grid-cols-3 divide-x divide-amber-200 text-center">
                <div className="pr-2">
                  <div className="text-amber-600 font-bold uppercase tracking-wide">Ku (par appareil)</div>
                  <div className="text-gray-700 mt-0.5">Utilisation réelle</div>
                </div>
                <div className="px-2">

                  <div className="text-gray-700 mt-0.5">Simultanéité</div>
                </div>
                <div className="pl-2">
                  <div className="text-amber-600 font-bold uppercase tracking-wide">Ke = {(settings.ke ?? 1.10).toFixed(2)}</div>

              {/* Profil Horaire — Étape 3 */}

                  <h3 className="font-semibold text-gray-800 flex items-center gap-2 mb-3 text-sm">
                    <Zap className="w-4 h-4 text-blue-500" /> Profil de Charge Journalier
                    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200 ml-auto">Étape 3</span>
                  </h3>

                  {/* Graphique 24h */}
                  <div style={{ height: 130 }}>
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={results.hourlyProfile} margin={{ top: 4, right: 4, left: -28, bottom: 0 }}>

                        <ReferenceLine x="18h" stroke="#fbbf24" strokeDasharray="4 2" label={{ value: 'PV↓', fontSize: 8, fill: '#d97706' }} />

                      <span className="text-orange-600 font-medium">Pic : {results.peakHour.power} W @ {results.peakHour.label}</span>

              {/* Générateur PV */}
              <div id="etape-5" className="border border-gray-200 rounded-lg p-4 print:border-gray-300">
                <h3 className="font-semibold text-gray-800 flex items-center gap-2 mb-3">
                  <Sun className="w-4 h-4 text-orange-500" /> Générateur PV
                  <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200 ml-auto">Étape 5</span>
                </h3>
                <div className="grid grid-cols-2 gap-y-2 text-sm">
                  <span className="text-gray-500">Tension Système:</span>
                  <span className="font-medium text-right text-gray-900">{results.systemVoltage} V</span>
                  <span className="text-gray-500">Total Panneaux:</span>
                  <span className="font-bold text-right text-gray-900">{results.totalPanels} panneaux</span>
                  <span className="text-gray-500">Configuration:</span>
                  <span className="font-medium text-right text-blue-600">
                    {results.panelsParallel} chaînes de {results.panelsSeries} en série
                  </span>
                  {results.inverterPower > 0 && (() => {
                    const ratio = results.peakPower / results.inverterPower;
                    const optimal = ratio >= 1.2 && ratio <= 1.4;
                    const ok = ratio >= 1.0 && ratio <= 1.5;
                    return (
                      <>
                        <span className="text-gray-500">Ratio DC/AC:</span>
                        <span className={`font-bold text-right ${optimal ? 'text-green-600' : ok ? 'text-orange-500' : 'text-red-600'}`}>
                          {ratio.toFixed(2)} {optimal ? '✓ optimal' : ok ? '~ acceptable' : '✗ hors plage'}
                        </span>
                      </>
                    );
                  })()}
                </div>
                <div className="mt-2 text-xs text-gray-400 bg-gray-50 p-1.5 rounded">
                  Ratio DC/AC cible : 1.2 – 1.4 pour zones tropicales
                </div>
              </div>

              {/* Parc Batterie */}
              <div id="etape-6" className="border border-gray-200 rounded-lg p-4 print:border-gray-300">
                <h3 className="font-semibold text-gray-800 flex items-center gap-2 mb-3">
                  <Battery className="w-4 h-4 text-green-500" /> Parc Batterie
                  <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200 ml-auto">Étape 6</span>
                </h3>
                <div className="grid grid-cols-2 gap-y-2 text-sm">
                  <span className="text-gray-500">Capacité Ah:</span>
                  <span className="font-medium text-right text-gray-900">{Math.round(results.batteryBankCapacity)} Ah</span>
                  <span className="text-gray-500">Capacité Énergie:</span>
                  <span className="font-medium text-right text-gray-900">{(results.batteryBankCapacityKWh).toFixed(1)} kWh</span>
                  <span className="text-gray-500">Nombre total:</span>
                  <span className="font-bold text-right text-gray-900">{results.totalBatteries} batteries</span>
                  <span className="text-gray-500">Câblage:</span>
                  <span className="font-medium text-right text-blue-600">
                    {results.batteriesParallel} branches de {results.batteriesSeries} en série
                  </span>
                  {results.batteryBankCapacityKWh > 0 && results.inverterPower > 0 && (() => {
                    const cRate = results.inverterPower / (results.batteryBankCapacityKWh * 1000);
                    const cOk = cRate < 1;
                    return (
                      <>
                        <span className="text-gray-500">C-rate décharge:</span>
                        <span className={`font-bold text-right ${cOk ? 'text-green-600' : 'text-red-600'}`}>
                          {cRate.toFixed(2)} C {cOk ? '✓' : '✗ > 1C'}
                        </span>
                      </>
                    );
                  })()}
                </div>
                {results.batteryBankCapacityKWh > 0 && results.inverterPower > 0 && (
                  <div className="mt-2 text-xs text-gray-400 bg-gray-50 p-1.5 rounded">
                    C-rate recommandé : &lt; 1C (idéalement &lt; 0.5C pour LiFePO4)
                  </div>
                )}
              </div>

              {/* Électronique */}
              <div id="etape-7" className="border border-gray-200 rounded-lg p-4 print:border-gray-300">
                <h3 className="font-semibold text-gray-800 flex items-center gap-2 mb-3">
                  <Cpu className="w-4 h-4 text-purple-500" /> Régulateur &amp; Onduleur
                  <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200 ml-auto">Étape 7</span>
                </h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {/* Régulateur */}
                  <div className="bg-purple-50 rounded-lg p-3 print:bg-transparent print:border print:border-purple-200">
                    <div className="text-sm font-semibold text-purple-900 mb-2">Régulateur de Charge</div>
                    <div className="space-y-1 text-sm">
                      <div className="flex justify-between">
                        <span className="text-gray-600">Type:</span>
                        <span className="font-medium text-gray-900">MPPT</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-gray-600">Courant min:</span>
                        <span className="font-bold text-gray-900">{Math.ceil(results.regulatorAmps)} A</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-gray-600">Tension:</span>
                        <span className="font-medium text-gray-900">{results.systemVoltage} V</span>
                      </div>
                    </div>
                  </div>
                  {/* Onduleur */}
                  <div className="bg-indigo-50 rounded-lg p-3 print:bg-transparent print:border print:border-indigo-200">
                    <div className="text-sm font-semibold text-indigo-900 mb-2">Onduleur DC/AC</div>
                    <div className="space-y-1 text-sm">
                      <div className="flex justify-between">
                        <span className="text-gray-600">Type:</span>
                        <span className="font-medium text-gray-900">Pur Sinus</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-gray-600">Puissance min:</span>
                        <span className="font-bold text-gray-900">{Math.ceil(results.inverterPower)} W</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-gray-600">Entrée:</span>
                        <span className="font-medium text-gray-900">{results.systemVoltage} V</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Graphique Répartition */}
              {energyData.length > 0 && (
                <div className="mt-4 print:hidden">
                  <h4 className="text-xs text-center text-gray-400 mb-2">Répartition Consommation (Wh)</h4>
                  <div className="h-40 w-full flex items-center justify-center">
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie
                          data={energyData}
                          cx="50%"
                          cy="50%"
                          innerRadius={30}
                          outerRadius={50}
                          paddingAngle={5}
                          dataKey="value"
                        >
                          {energyData.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={entry.color} />
                          ))}
                        </Pie>
                        <Tooltip formatter={(value) => Math.round(value) + ' Wh'} />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="flex flex-wrap justify-center gap-3 mt-2">
                    {energyData.map((entry, index) => (
                      <div key={index} className="flex items-center gap-1.5">
                        <span className="w-3 h-3 rounded-full" style={{ backgroundColor: entry.color }}></span>
                        <span className="text-xs text-gray-600">
                          {entry.name}: <span className="font-medium text-gray-900">{Math.round(entry.value)} Wh</span>
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Bouton Cable Tool — Étape 11 */}
              <div id="etape-11" className="mt-4">
                <div className="flex items-center justify-between mb-1.5 print:hidden">
                  <span className="text-xs text-gray-500 font-medium">Sections de Câbles</span>
                  <span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-green-100 text-green-700 border border-green-200">Étape 11</span>
                </div>
                <button
                  onClick={openCableTool}
                  className="w-full flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-lg transition-all shadow-md print:hidden"
                >
                  <Ruler className="w-4 h-4" />
                  Calculer les Sections de Câbles
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // COMPONENT: CableTool (Modal) — Étape 11 complète
    // =========================================================
    function CableTool({ isOpen, onClose, results }) {
      const SEGMENTS_INIT = [
        { id: 'pv-reg',   label: 'Panneaux → Régulateur MPPT', isAC: false, length: 10 },
        { id: 'reg-bat',  label: 'Régulateur → Batteries',     isAC: false, length: 2  },
        { id: 'bat-inv',  label: 'Batteries → Onduleur',       isAC: false, length: 2  },
        { id: 'inv-load', label: 'Onduleur → Tableau AC',      isAC: true,  length: 10 },
      ];
      const CABLE_TYPE = { 'pv-reg': 'H1Z2Z2-K', 'reg-bat': 'H07V-K', 'bat-inv': 'H07V-K', 'inv-load': 'U-1000 R2V' };

      const [lengths, setLengths] = useState({ 'pv-reg': 10, 'reg-bat': 2, 'bat-inv': 2, 'inv-load': 10 });

      const updateLength = (id, val) => setLengths(prev => ({ ...prev, [id]: parseFloat(val) || 0 }));

      if (!isOpen) return null;

      // Courants auto-calculés
      const vSys = results.systemVoltage || 48;
      const currents = {
        'pv-reg':   vSys > 0 ? (results.peakPower    || 0) / vSys : 0,
        'reg-bat':  results.regulatorAmps || 0,
        'bat-inv':  vSys > 0 ? (results.inverterPower || 0) / vSys : 0,
        'inv-load': (results.inverterPower || 0) / 230,
      };

      // Calcul complet par segment
      const ALLSIZES = [1.5, 2.5, 4, 6, 10, 16, 25, 35, 50, 70, 95];
      const rho = 0.0225;

      const segData = SEGMENTS_INIT.map(seg => {
        const I       = currents[seg.id];
        const L       = lengths[seg.id];
        const V       = seg.isAC ? 230 : vSys;
        const dropPct = seg.isAC ? 0.02 : 0.01;
        const deltaVadm = dropPct * V;

        // Section ΔV
        const sDV = (deltaVadm > 0 && I > 0) ? (2 * L * rho * I) / deltaVadm : 0;
        const normDV = ALLSIZES.find(s => s >= sDV) || ALLSIZES[ALLSIZES.length - 1];

        // Section thermique (avec coeff 1.25)
        const cTable = seg.isAC ? AC_CABLE_TABLE : DC_SOLAR_CABLE_TABLE;
        const thermEntry = cTable.find(e => e.ampacity >= I * 1.25);
        const normTherm = thermEntry ? thermEntry.section : ALLSIZES[ALLSIZES.length - 1];

        // Section retenue = max des deux contraintes
        const sFinal = Math.max(normDV, normTherm);

        // Ampacité de la section retenue
        const retEntry = cTable.find(e => e.section >= sFinal);
        const ampacity = retEntry ? retEntry.ampacity : null;

        // ΔV réelle sur section retenue
        const dvReal = (sFinal > 0 && L > 0 && I > 0) ? (2 * L * rho * I) / sFinal : 0;
        const dvPct  = V > 0 ? (dvReal / V) * 100 : 0;
        const dvOk   = dvPct <= dropPct * 100;
        const thermOk = ampacity ? ampacity >= I * 1.25 : true;
        const ok = dvOk && thermOk;

        return { ...seg, I, L, V, sDV, normDV, normTherm, sFinal, ampacity, dvPct, dvOk, thermOk, ok,
          cableType: CABLE_TYPE[seg.id], dropPctMax: dropPct * 100 };
      });

      const allOk = segData.every(s => s.ok);

      const handleDownloadPDF = () => {
        const el = document.getElementById('cable-tool-content');
        if (!el || !window.html2pdf) { alert("PDF non disponible. Utilisez Imprimer."); return; }
        window.html2pdf().set({
          margin: [10, 8],
          filename: `etape11-cables-${new Date().toISOString().split('T')[0]}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        }).from(el).save();
      };

      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-xl shadow-2xl max-w-5xl w-full max-h-[95vh] overflow-y-auto">

            {/* Header */}
            <div className="p-5 border-b flex justify-between items-center sticky top-0 bg-white z-10">
              <div className="flex items-center gap-3 flex-wrap">
                <Ruler className="w-5 h-5 text-gray-700 flex-shrink-0" />
                <h2 className="text-xl font-bold text-gray-900">Étape 11 — Dimensionnement des Câbles</h2>
                <span className={`text-xs font-bold px-2 py-0.5 rounded-full border ${allOk ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200'}`}>
                  {allOk ? '✓ Conforme NFC 15-100' : '✗ Vérification requise'}
                </span>
              </div>
              <div className="flex items-center gap-2 flex-shrink-0">
                <button onClick={handleDownloadPDF} className="flex items-center gap-1.5 text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg transition-colors">
                  <Download className="w-4 h-4" /> PDF
                </button>
                <button onClick={() => window.print()} className="flex items-center gap-1.5 text-sm bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg transition-colors">
                  <Printer className="w-4 h-4" /> Imprimer
                </button>
                <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full ml-1">
                  <XIcon className="w-5 h-5 text-gray-500" />
                </button>
              </div>
            </div>

            <div id="cable-tool-content" className="p-6 space-y-6">

              {/* Rappel formules + types câbles */}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                  <div className="font-bold text-yellow-800 mb-2">Formules NFC 15-100</div>
                  <div className="font-mono text-xs space-y-1 text-yellow-900">
                    <div>DC : S = 2·L·ρ·I / ΔU &nbsp;— ΔU ≤ 1%</div>
                    <div>AC : S = 2·L·ρ·I / ΔU &nbsp;— ΔU ≤ 2%</div>
                    <div>ρ Cu (70 °C) = 0.0225 Ω·mm²/m</div>
                    <div className="mt-1 text-orange-700 font-semibold">Coeff. thermique : I × 1.25</div>
                  </div>
                </div>
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                  <div className="font-bold text-blue-800 mb-2">Types de câbles retenus</div>
                  <div className="text-xs space-y-1.5 text-blue-900">
                    <div><span className="font-mono bg-yellow-100 text-yellow-800 px-1.5 py-0.5 rounded mr-2">H1Z2Z2-K</span>DC solaire — UV, 1 500 V, 120 °C</div>
                    <div><span className="font-mono bg-gray-100 text-gray-700 px-1.5 py-0.5 rounded mr-2">H07V-K</span>DC interne — souple, 450/750 V</div>
                    <div><span className="font-mono bg-green-100 text-green-800 px-1.5 py-0.5 rounded mr-2">U-1000 R2V</span>AC distribution — 0,6/1 kV</div>
                  </div>
                </div>
              </div>

              {/* Fiches segments */}
              <div className="space-y-3">
                {segData.map(seg => (
                  <div key={seg.id} className={`rounded-xl border-2 p-4 transition-colors ${seg.ok ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}`}>
                    <div className="flex justify-between items-start mb-3 flex-wrap gap-2">
                      <div>
                        <h3 className="font-bold text-gray-900 text-base">{seg.label}</h3>
                        <span className="text-xs text-gray-500 font-mono">{seg.cableType} — {seg.isAC ? 'AC 230V' : `DC ${seg.V}V`} — ΔV ≤ {seg.dropPctMax}%</span>
                      </div>
                      <span className={`text-xs font-bold px-3 py-1 rounded-full border ${seg.ok ? 'bg-green-200 text-green-800 border-green-300' : 'bg-red-200 text-red-800 border-red-300'}`}>
                        {seg.ok ? '✓ Conforme' : '✗ Non conforme'}
                      </span>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-5 gap-3 text-sm">
                      {/* Courant */}
                      <div className="bg-white/70 rounded-lg p-2.5 border border-gray-200">
                        <div className="text-xs text-gray-500 mb-1">Courant (I)</div>
                        <div className="font-bold text-gray-900">{seg.I.toFixed(1)} A</div>
                        <div className="text-xs text-gray-400">{seg.V} V</div>
                      </div>
                      {/* Longueur */}
                      <div className="bg-white/70 rounded-lg p-2.5 border border-gray-200">
                        <label className="block text-xs text-gray-500 mb-1">Longueur (L)</label>
                        <input
                          type="number" min="0.5" step="0.5"
                          value={seg.L}
                          onChange={e => updateLength(seg.id, e.target.value)}
                          className="w-full bg-white border border-gray-300 rounded px-2 py-1 text-sm font-bold text-black focus:ring-orange-500 focus:border-orange-500"
                        />
                        <div className="text-xs text-gray-400 mt-0.5">mètres</div>
                      </div>
                      {/* Section ΔV */}
                      <div className="bg-white/70 rounded-lg p-2.5 border border-gray-200">
                        <div className="text-xs text-gray-500 mb-1">Section ΔV calc.</div>
                        <div className="font-semibold text-gray-800">{seg.sDV.toFixed(2)} mm²</div>
                        <div className="text-xs text-gray-400">→ norm. {seg.normDV} mm²</div>
                      </div>
                      {/* Section thermique */}
                      <div className="bg-white/70 rounded-lg p-2.5 border border-gray-200">
                        <div className="text-xs text-gray-500 mb-1">Section thermique</div>
                        <div className="font-semibold text-gray-800">{seg.normTherm} mm²</div>
                        <div className="text-xs text-gray-400">I × 1.25 = {(seg.I * 1.25).toFixed(1)} A</div>
                      </div>
                      {/* Section retenue */}
                      <div className={`rounded-lg p-2.5 border-2 ${seg.ok ? 'bg-green-100 border-green-300' : 'bg-red-100 border-red-300'}`}>
                        <div className="text-xs text-gray-600 mb-0.5 font-medium">Section retenue</div>
                        <div className={`text-2xl font-extrabold ${seg.ok ? 'text-green-700' : 'text-red-700'}`}>{seg.sFinal} <span className="text-sm font-semibold">mm²</span></div>
                        <div className={`text-xs font-semibold mt-0.5 ${seg.dvOk ? 'text-green-700' : 'text-red-600'}`}>
                          ΔV = {seg.dvPct.toFixed(2)}% {seg.dvOk ? '✓' : `✗ > ${seg.dropPctMax}%`}
                        </div>
                        {seg.ampacity && (
                          <div className={`text-xs font-semibold ${seg.thermOk ? 'text-green-700' : 'text-red-600'}`}>
                            Amp. {seg.ampacity} A {seg.thermOk ? '✓' : '✗'}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Tableau récapitulatif */}
              <div>
                <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2 text-sm">
                  <LayoutGrid className="w-4 h-4 text-orange-500" /> Tableau Récapitulatif — Nomenclature Câbles
                </h3>
                <div className="overflow-x-auto rounded-lg border border-gray-200">
                  <table className="w-full text-xs">
                    <thead className="bg-gray-800 text-white uppercase tracking-wide">
                      <tr>
                        <th className="px-3 py-2.5 text-left">Segment</th>
                        <th className="px-3 py-2.5 text-right">I (A)</th>
                        <th className="px-3 py-2.5 text-right">L (m)</th>
                        <th className="px-3 py-2.5 text-right">S ΔV (mm²)</th>
                        <th className="px-3 py-2.5 text-right">S therm. (mm²)</th>
                        <th className="px-3 py-2.5 text-right font-bold">S retenue (mm²)</th>
                        <th className="px-3 py-2.5 text-right">Ampacité (A)</th>
                        <th className="px-3 py-2.5 text-right">ΔV réelle (%)</th>
                        <th className="px-3 py-2.5 text-center">Type câble</th>
                        <th className="px-3 py-2.5 text-center">Statut</th>
                      </tr>
                    </thead>
                    <tbody>
                      {segData.map((seg, i) => (
                        <tr key={seg.id} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                          <td className="px-3 py-2 font-semibold text-gray-800">{seg.label}</td>
                          <td className="px-3 py-2 text-right text-gray-700">{seg.I.toFixed(1)}</td>
                          <td className="px-3 py-2 text-right text-gray-700">{seg.L}</td>
                          <td className="px-3 py-2 text-right text-gray-500">{seg.sDV.toFixed(2)}</td>
                          <td className="px-3 py-2 text-right text-gray-500">{seg.normTherm}</td>

                <div className="space-y-2 text-xs">
                  <div className="flex justify-between items-center p-2 bg-purple-50 rounded">
                    <span className="text-gray-600">Disjoncteur AC (1.25×{res.iAC.toFixed(1)}={res.acBreakerRaw.toFixed(1)}A, courbe C)</span>
                    <span className="font-bold text-purple-700">{res.acBreakerStd} A — {s.phaseType === 'tri' ? '4P' : '2P'}</span>
                  </div>
                  <div className="flex justify-between items-center p-2 bg-pink-50 rounded">
                    <span className="text-gray-600">DDR ({res.acRCDType})</span>
                    <span className="font-bold text-pink-700">{res.acRCDmA} mA — {s.phaseType === 'tri' ? '4P' : '2P'}</span>
                  </div>
                  <div className="flex justify-between items-center p-2 bg-orange-50 rounded">
                    <span className="text-gray-600">Parafoudre T2 AC (Un={res.acSurgeVoltage}V, In≥20kA)</span>
                    <span className="font-bold text-orange-700">{res.acSurgeVoltage} V / 40 kA</span>
                  </div>
                  <div className="flex justify-between items-center p-2 bg-gray-50 rounded">
                    <span className="text-gray-600">Câble AC onduleur→AC Box / TGBT</span>
                    <span className="font-bold text-gray-700">{res.acCableStd} mm² Cu {s.phaseType === 'tri' ? '4G' : '3G'}{res.acCableStd}</span>
                  </div>
                  <div className="flex justify-between items-center p-2 bg-gray-50 rounded">
                    <span className="text-gray-600">Compteur énergie bidirectionnel</span>
                    <span className="font-bold text-gray-700">Classe 1 — {s.phaseType === 'tri' ? '3 phases' : '1 phase'}</span>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // =========================================================
    // COMPONENT: App (Main)
    // =========================================================
    function App() {
      const [loads, setLoads] = useState(() => {
        // Génère un tableau activeHours[24] depuis start + durée
        const mkH = (s, d) => Array.from({ length: 24 }, (_, i) => {
          if (d >= 24) return true;
          const e = (s + d) % 24;
          return s < e ? (i >= s && i < e) : (i >= s || i < e);
        });
        return [
          { id: '1', name: 'Lampes LED',    type: LoadType.AC, power: 10,  quantity: 5, ku: 0.80, activeHours: mkH(18, 6)  },
          { id: '2', name: 'Téléviseur',    type: LoadType.AC, power: 80,  quantity: 1, ku: 1.00, activeHours: mkH(19, 4)  },
          { id: '3', name: 'Réfrigérateur', type: LoadType.AC, power: 150, quantity: 1, ku: 0.75, activeHours: mkH(6,  12) },
        ];
      });

      const [settings, setSettings] = useState(DEFAULT_SETTINGS);

      const [results, setResults] = useState({
        totalEnergyDaily: 0,
        energyAC: 0,
        energyAC_raw: 0,
        energyDC: 0,
        peakPower: 0,
        systemVoltage: 12,
        totalPanels: 0,
        panelsSeries: 0,
        panelsParallel: 0,
        batteryBankCapacity: 0,
        batteryBankCapacityKWh: 0,
        totalBatteries: 0,
        batteriesSeries: 0,
        batteriesParallel: 0,
        regulatorAmps: 0,
        inverterPower: 0,
        ksKe: 1,
        energyDay: 0,
        energyNight: 0,
        hourlyProfile: Array.from({ length: 24 }, (_, h) => ({ h, label: h < 10 ? `0${h}h` : `${h}h`, power: 0 })),
        peakHour: { power: 0 },
      });

      const [isCableToolOpen, setIsCableToolOpen] = useState(false);
      const [activeTab, setActiveTab] = useState('dimensionnement');
      const [stringSettings, setStringSettings] = useState(DEFAULT_STRING_SETTINGS);
      const [projectName, setProjectName] = useState('Nouveau Projet');

      useEffect(() => {
        const calc = calculateSolarSystem(loads, settings);
        setResults(calc);
      }, [loads, settings]);

      // ── Sauvegarde projet ──────────────────────────────────────
      const handleSaveProject = () => {
        const project = {
          version: '1.0',
          projectName,
          savedAt: new Date().toISOString(),
          loads,
          settings,
          stringSettings,
        };
        const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${projectName.replace(/[^a-z0-9]/gi, '_')}_${new Date().toISOString().split('T')[0]}.sdp`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // ── Chargement projet ─────────────────────────────────────
      const handleLoadProject = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const project = JSON.parse(evt.target.result);
            if (project.projectName) setProjectName(project.projectName);
            if (Array.isArray(project.loads)) setLoads(project.loads);
            if (project.settings)       setSettings(prev => ({ ...prev, ...project.settings }));
            if (project.stringSettings) setStringSettings(prev => ({ ...prev, ...project.stringSettings }));
          } catch {
            alert('Fichier invalide. Veuillez sélectionner un fichier .sdp valide.');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      return (
        <div className="min-h-screen bg-gray-50 pb-20 print:bg-white print:pb-0">
          {/* Header */}
          <header className="bg-white border-b border-gray-200 sticky top-0 z-30 print:static print:border-none print:shadow-none">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center gap-3">
              <SunMedium className="w-8 h-8 text-orange-500 flex-shrink-0" />
              <h1 className="text-xl font-bold text-gray-900 tracking-tight flex-shrink-0">
                Solar<span className="text-orange-500">Dimension</span>
              </h1>
              <span className="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded flex-shrink-0 hidden sm:inline print:inline">
                Dimensionnement PV
              </span>

              {/* Spacer */}
              <div className="flex-1" />

              {/* Contrôles projet */}
              <div className="flex items-center gap-2 print:hidden">
                <input
                  type="text"
                  value={projectName}
                  onChange={e => setProjectName(e.target.value)}
                  className="hidden md:block text-sm border border-gray-300 rounded-lg px-3 py-1.5 w-44 text-gray-700 focus:ring-orange-500 focus:border-orange-500"
                  placeholder="Nom du projet..."
                />
                <button
                  onClick={handleSaveProject}
                  title="Sauvegarder le projet (.sdp)"
                  className="flex items-center gap-1.5 text-sm bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded-lg transition-colors font-medium"
                >
                  <Save className="w-4 h-4" />
                  <span className="hidden sm:inline">Sauvegarder</span>
                </button>
                <label
                  title="Charger un projet (.sdp)"
                  className="flex items-center gap-1.5 text-sm bg-gray-700 hover:bg-gray-800 text-white px-3 py-1.5 rounded-lg transition-colors font-medium cursor-pointer"
                >
                  <FolderOpen className="w-4 h-4" />
                  <span className="hidden sm:inline">Charger</span>
                  <input
                    type="file"
                    accept=".sdp,.json"
                    onChange={handleLoadProject}
                    className="hidden"
                  />
                </label>
              </div>
            </div>
          </header>

          {/* Navigation par onglets */}
          <div className="bg-white border-b border-gray-200 sticky top-16 z-20 print:hidden">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <nav className="flex">
                <button
                  onClick={() => setActiveTab('dimensionnement')}
                  className={`flex items-center gap-2 px-5 py-3.5 text-sm font-medium border-b-2 transition-colors ${activeTab === 'dimensionnement' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}
                >
                  <Zap className="w-4 h-4" /> Dimensionnement Autonome
                </button>
                <button
                  onClick={() => setActiveTab('strings')}
                  className={`flex items-center gap-2 px-5 py-3.5 text-sm font-medium border-b-2 transition-colors ${activeTab === 'strings' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}
                >
                  <GitBranch className="w-4 h-4" /> Strings & Parallèles
                </button>
              </nav>
            </div>
          </div>

          {/* Barre de progression 12 étapes */}
          <StepProgress activeTab={activeTab} setActiveTab={setActiveTab} />

          <main id="report-container" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 print:py-4 print:px-0">
            {activeTab === 'dimensionnement' ? (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 print:block">
                {/* Barre d'actions PDF */}
                <div className="lg:col-span-12 print:hidden">
                  <div className="flex items-center justify-between bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100">
                    <div className="flex items-center gap-2">
                      <Zap className="w-4 h-4 text-orange-500" />
                      <span className="text-sm font-semibold text-gray-700">Rapport de Dimensionnement Autonome</span>
                    </div>
                    <div className="flex gap-2">
                      <button
                        onClick={() => {
                          const el = document.getElementById('report-container');
                          if (el && window.html2pdf) {
                            window.html2pdf().set({
                              margin: [10, 10],
                              filename: `rapport-solaire-${new Date().toISOString().split('T')[0]}.pdf`,
                              image: { type: 'jpeg', quality: 0.98 },
                              html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                            }).from(el).save();
                          } else {
                            alert("La librairie PDF n'est pas chargée.");
                          }
                        }}
                        className="flex items-center gap-1.5 text-sm bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors"
                        title="Télécharger en PDF"
                      >
                        <Download className="w-4 h-4" /> PDF
                      </button>
                      <button
                        onClick={() => window.print()}
                        className="flex items-center gap-1.5 text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors"
                        title="Imprimer"
                      >
                        <Printer className="w-4 h-4" /> Imprimer
                      </button>
                    </div>
                  </div>
                </div>
                {/* Colonne gauche: Saisies */}
                <div className="lg:col-span-7 space-y-6 print:space-y-4">
                  <div className="bg-blue-600 text-white p-4 rounded-lg shadow-sm mb-6 print:hidden">
                    <h2 className="font-semibold text-lg">Instructions</h2>
                    <p className="text-blue-100 text-sm mt-1">
                      Remplissez la liste des appareils et configurez les paramètres de votre site.
                      Le dimensionnement se met à jour automatiquement sur la droite.
                    </p>
                  </div>
                  <LoadInput loads={loads} setLoads={setLoads} />
                  <SettingsInput settings={settings} setSettings={setSettings} />
                </div>
                {/* Colonne droite: Résultats */}
                <div className="lg:col-span-5 print:mt-8 print:break-before-page">
                  <div className="sticky top-32 print:static">
                    <ResultsDisplay
                      results={results}
                      settings={settings}
                      openCableTool={() => setIsCableToolOpen(true)}
                    />
                  </div>
                </div>
              </div>
            ) : (
              <StringDimensioning s={stringSettings} setS={setStringSettings} />
            )}
          </main>

          {/* Modal Câbles */}
          <CableTool
            isOpen={isCableToolOpen}
            onClose={() => setIsCableToolOpen(false)}
            results={results}
          />
        </div>
      );
    }

    // =========================================================
    // MOUNT
    // =========================================================
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );
  </script>
</body>
</html>
